<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PACK — Connected</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;1,400&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #F7F5F2;
      color: #1A1A18;
      font-family: 'DM Sans', system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 40px 24px;
    }
    .wrap {
      text-align: center;
      max-width: 360px;
    }
    .logo {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 40px;
      font-style: italic;
      font-weight: 400;
      letter-spacing: -0.02em;
      margin-bottom: 32px;
    }
    .headline {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 26px;
      font-style: italic;
      font-weight: 400;
      line-height: 1.3;
      margin-bottom: 14px;
    }
    .body {
      font-size: 14px;
      color: #6B6860;
      line-height: 1.7;
    }
    .close-note {
      margin-top: 32px;
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #9E9B94;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <p class="logo">pack</p>
    <h1 class="headline">Extension connected.</h1>
    <p class="body">Your PACK account is now linked. Close this tab and return to the extension.</p>
    <p class="close-note">You can close this tab</p>
  </div>
</body>
</html>
